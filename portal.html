<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resident Portal Login | Resident Association Management</title>
  <link rel="icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="description" content="Resident portal login for Resident Association Management." />
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root{--red:#C8102E;--red-mid:#c04060;--red-deep:#8b1428;--navy:#1B2A4A;--navy-deep:#0f1c3a}
    [data-theme="dark"]{--bg:#07101c;--bg-nav:rgba(7,16,28,0.96);--surface:rgba(255,255,255,0.025);--border:rgba(255,255,255,0.07);--border-acc:rgba(224,112,138,0.22);--text:#dde6f4;--text-sub:rgba(200,212,232,0.44);--text-muted:rgba(180,196,220,0.30);--card-bg:rgba(255,255,255,0.025);--shadow:0 8px 40px rgba(0,0,0,0.5)}
    [data-theme="light"]{--bg:#f4f7fc;--bg-nav:rgba(255,255,255,0.86);--surface:rgba(255,255,255,0.78);--border:rgba(192,64,96,0.12);--border-acc:rgba(192,64,96,0.20);--text:#0f1c3a;--text-sub:rgba(15,28,58,0.50);--text-muted:rgba(15,28,58,0.34);--card-bg:#ffffff;--shadow:0 4px 24px rgba(192,64,96,0.10)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column}
    a{color:inherit;text-decoration:none}
    button{cursor:pointer;border:none;background:none;font-family:inherit}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:var(--bg-nav);backdrop-filter:blur(14px)}
    .nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer}
    .nav-logo img{height:38px;width:38px;object-fit:contain}
    .nav-logo-text{font-family:'Playfair Display',serif;font-size:.88rem;font-weight:700;color:var(--text)}
    .nav-actions{display:flex;align-items:center;gap:9px}
    .nav-link{font-size:.74rem;font-weight:600;padding:7px 14px;border-radius:6px;border:1px solid var(--border-acc);color:var(--text-sub)}
    .nav-link:hover{color:#fff;border-color:#c04060;background:#c04060}
    .theme-btn{width:34px;height:34px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center}
    .portal-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:100px 24px 60px;background:var(--bg)}
    .portal-card{width:100%;max-width:480px;background:var(--card-bg);border:1px solid var(--border);border-radius:20px;padding:48px 40px;box-shadow:var(--shadow);text-align:center}
    .portal-logo img{height:64px;width:64px;object-fit:contain;margin-bottom:24px}
    .portal-card h1{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:900;margin-bottom:10px;color:var(--text)}
    .portal-card .sub{font-size:.9rem;color:var(--text-sub);margin-bottom:32px;line-height:1.6}
    .coming-badge{display:inline-flex;border-radius:100px;padding:6px 18px;font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:28px;background:rgba(192,64,96,.1);border:1px solid rgba(192,64,96,.25);color:var(--red-mid)}
    .portal-options{display:flex;flex-direction:column;gap:12px}
    .portal-btn{display:flex;align-items:center;gap:14px;padding:16px 20px;border-radius:12px;border:1px solid var(--border);background:var(--surface);text-align:left;width:100%;cursor:pointer}
    .portal-btn:hover{border-color:var(--red-mid);background:rgba(192,64,96,.06)}
    .portal-btn-text h3{font-size:.9rem;font-weight:600;color:var(--text);margin-bottom:2px}
    .portal-btn-text p{font-size:.76rem;color:var(--text-muted)}
    .portal-arrow{margin-left:auto;color:var(--text-muted)}
    footer{background:#050c16;color:rgba(200,212,232,.65);padding:28px 24px}
    .footer-bottom{max-width:960px;margin:0 auto;display:flex;justify-content:space-between;font-size:.74rem}
  </style>
</head><body>

  <nav>
    <div class="nav-logo" onclick="window.location='index.html'">
      <img id="navLogo" src="logo-dark.png" alt="RAM Logo" />
      <div class="nav-logo-text">Resident Association Management</div>
    </div>
    <div class="nav-actions">
      <a href="index.html" class="nav-link">Home</a>
      <button class="theme-btn" id="themeToggle">🌙</button>
    </div>
  </nav>

  <div class="portal-wrap">
    <div class="portal-card">
      <div class="portal-logo">
        <img src="logo-dark.png" alt="RAM Logo" />
      </div>
      <div class="coming-badge">Resident Portal</div>
      <h1>Welcome Back</h1>
      <p class="sub">Access your community portal to pay dues, submit requests, and stay connected.</p>

      <div class="portal-options">

        <button class="portal-btn" onclick="window.location='https://app.residentam.com'">
          <div class="portal-btn-text">
            <h3>Log Into Your Resident Portal</h3>
            <p>Access your dashboard, dues, and tickets</p>
          </div>
          <div class="portal-arrow">&rarr;</div>
        </button>

        <button class="portal-btn" onclick="alert('ARC Request module coming soon!')">
          <div class="portal-btn-text">
            <h3>Submit an Architectural Request</h3>
            <p>Improvement or modification approval</p>
          </div>
          <div class="portal-arrow">&rarr;</div>
        </button>

        <button class="portal-btn" onclick="alert('Board member login coming soon!')">
          <div class="portal-btn-text">
            <h3>Board Member Login Request</h3>
            <p>Request access to the board portal</p>
          </div>
          <div class="portal-arrow">&rarr;</div>
        </button>

      </div>
    </div>
  </div>

  <footer>
    <div class="footer-bottom">
      <span>&copy; <span id="year"></span> Resident Association Management. All rights reserved.</span>
      <span><a href="index.html" style="color:inherit">Home</a></span>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    const html = document.documentElement;
    const toggle = document.getElementById('themeToggle');
    function setTheme(t) {
      html.setAttribute('data-theme', t);
      toggle.textContent = t === 'light' ? '☀️' : '🌙';
    }
    setTheme(window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    toggle.addEventListener('click', () => setTheme(html.getAttribute('data-theme') === 'light' ? 'dark' : 'light'));
  </script>

</body>
</html>
