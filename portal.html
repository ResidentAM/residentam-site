<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resident Portal Login | Resident Association Management</title>

  <link rel="icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />

  <meta name="description" content="Resident portal login for Resident Association Management." />
  <meta name="robots" content="noindex" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root{--red:#C8102E;--red-soft:#e08090;--red-mid:#c04060;--red-deep:#8b1428;--navy:#1B2A4A;--navy-deep:#0f1c3a}
    [data-theme="dark"]{--bg:#07101c;--bg-nav:rgba(7,16,28,0.96);--surface:rgba(255,255,255,0.025);--border:rgba(255,255,255,0.07);--border-acc:rgba(224,112,138,0.22);--text:#dde6f4;--text-sub:rgba(200,212,232,0.44);--text-muted:rgba(180,196,220,0.30);--accent-col:#d07888;--card-bg:rgba(255,255,255,0.025);--shadow:0 8px 40px rgba(0,0,0,0.5)}
    [data-theme="light"]{--bg:#f4f7fc;--bg-nav:rgba(255,255,255,0.86);--surface:rgba(255,255,255,0.78);--border:rgba(192,64,96,0.12);--border-acc:rgba(192,64,96,0.20);--text:#0f1c3a;--text-sub:rgba(15,28,58,0.50);--text-muted:rgba(15,28,58,0.34);--accent-col:#c04060;--card-bg:#ffffff;--shadow:0 4px 24px rgba(192,64,96,0.10)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);transition:background .35s,color .35s;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column}
    a{color:inherit;text-decoration:none}
    button{cursor:pointer;border:none;background:none;font-family:inherit}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:var(--bg-nav);box-shadow:0 2px 20px rgba(0,0,0,.14);backdrop-filter:blur(14px)}
    .nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer}
    .nav-logo img{height:38px;width:38px;object-fit:contain}
    .nav-logo-text{font-family:'Playfair Display',serif;font-size:.88rem;font-weight:700;line-height:1.25;color:var(--text)}
    .nav-actions{display:flex;align-items:center;gap:9px}
    .nav-link{font-size:.74rem;font-weight:600;letter-spacing:.03em;padding:7px 14px;border-radius:6px;border:1px solid var(--border-acc);color:var(--text-sub);background:transparent;transition:all .2s;display:inline-block}
    .nav-link:hover{color:#fff;border-color:#c04060;background:#c04060}
    .nav-link.active{color:var(--text);border-color:var(--border);background:var(--surface)}
    .theme-btn{width:34px;height:34px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.9rem}
    @media(max-width:430px){.nav-logo-text{display:none};nav{padding:12px 16px}}
    .portal-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:100px 24px 60px;background:radial-gradient(ellipse 90% 60% at 50% 0%,rgba(20,38,72,.9) 0%,transparent 70%),var(--bg);position:relative;overflow:hidden}
    [data-theme="light"] .portal-wrap{background:radial-gradient(ellipse 80% 60% at 20% 20%,rgba(210,220,245,.8) 0%,transparent 65%),linear-gradient(160deg,#dce8f8 0%,#eef2fa 100%)}
    .portal-wrap::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:46px 46px}
    [data-theme="light"] .portal-wrap::before{background-image:radial-gradient(circle,rgba(27,42,74,.06) 1px,transparent 1px);background-size:28px 28px}
    .portal-card{position:relative;z-index:2;width:100%;max-width:480px;background:var(--card-bg);border:1px solid var(--border);border-radius:20px;padding:48px 40px;box-shadow:var(--shadow);text-align:center}
    @media(max-width:500px){.portal-card{padding:32px 22px}}
    .portal-card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:2px;border-radius:2px;background:linear-gradient(90deg,var(--red-mid),var(--red-deep))}
    .portal-logo{margin:0 auto 24px}
    .portal-logo img{height:64px;width:64px;object-fit:contain}
    .portal-card h1{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:900;margin-bottom:10px;line-height:1.15}
    [data-theme="dark"] .portal-card h1{background:linear-gradient(145deg,#e8eef8 0%,#e8a0b0 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    [data-theme="light"] .portal-card h1{background:linear-gradient(135deg,#0f1c3a 0%,#8b1428 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .portal-card .sub{font-size:.9rem;color:var(--text-sub);margin-bottom:32px;line-height:1.6}
    .coming-badge{display:inline-flex;align-items:center;gap:8px;border-radius:100px;padding:6px 18px;font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:28px;background:rgba(192,64,96,.1);border:1px solid rgba(192,64,96,.25);color:var(--red-mid)}
    .portal-options{display:flex;flex-direction:column;gap:12px;margin-bottom:28px}
    .portal-btn{display:flex;align-items:center;gap:14px;padding:16px 20px;border-radius:12px;border:1px solid var(--border);background:var(--surface);transition:all .25s;text-align:left;width:100%}
    .portal-btn:hover{border-color:var(--red-mid);background:rgba(192,64,96,.06);transform:translateX(3px)}
    .portal-btn-icon{width:40px;height:40px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
    [data-theme="dark"] .portal-btn-icon{background:rgba(192,64,96,.12);border:1px solid rgba(192,64,96,.2)}
    [data-theme="light"] .portal-btn-icon{background:rgba(27,42,74,.07);border:1px solid rgba(27,42,74,.12)}
